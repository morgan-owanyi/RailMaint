{% extends 'base.html' %}

{% block title %}Update Maintenance Log{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-header">

            <h2>Update Maintenance Log</h2>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">

                    Update

                </button>

                <a href="{% url 'maintenance:list' %}" class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
