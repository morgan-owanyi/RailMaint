{% extends 'base.html' %}

{% block title %}Add Employee{% endblock %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-header">
        <h4>Add Employee</h4>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-primary">
                Save Employee
            </button>

            <a href="{% url 'employees:list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
