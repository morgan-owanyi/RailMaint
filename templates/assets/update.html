{% extends 'base.html' %}

{% block title %}Edit Asset{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h3>Edit Asset</h3>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">

                Update Asset

            </button>

            <a href="{% url 'assets:list' %}" class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
