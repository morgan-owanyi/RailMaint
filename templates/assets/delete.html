{% extends 'base.html' %}

{% block title %}Delete Asset{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-body text-center">

        <h3>

            Delete "{{ asset.name }}"?

        </h3>

        <p>

            This action cannot be undone.

        </p>

        <form method="POST">

            {% csrf_token %}

            <button type="submit" class="btn btn-danger">

                Delete

            </button>

            <a href="{% url 'assets:list' %}" class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
